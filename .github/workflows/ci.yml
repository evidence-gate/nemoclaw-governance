name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint check
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest pyyaml

      - name: Install package
        run: pip install -e ".[yaml]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  cli-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[yaml]"

      - name: CLI smoke tests
        run: |
          nemoclaw-gov version
          nemoclaw-gov presets list
          nemoclaw-gov validate examples/blueprint-with-agentgov.yaml
          nemoclaw-gov validate examples/policy-with-agentgov.yaml
          nemoclaw-gov validate nemoclaw-presets/agentgov-proxy.yaml
